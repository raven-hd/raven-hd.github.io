<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Крыло Домовых Эльфов · Исторические портреты</title>
<link rel="icon" type="image/x-icon" href="/gift/house-elf/2026/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'ModernoTwo';
  src: url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/ofont.ru_Moderno%20Two.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root{
  --gold:#D4A843; --gold-light:#F0C860; --gold-dark:#8B6914;
  --cream:#F5E6C8; --cream-dim:#C8A878; --dark:#110A04; --ink:#2A1A0A;
  --fon:url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/kitchen_fon.png');
  --header-h:76px; --footer-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  font-family:'Cormorant Garamond',serif;color:var(--cream);}

#museum{position:fixed;inset:0;opacity:1;pointer-events:all;}
.kitchen-bg{position:absolute;inset:0;
  background-image:var(--fon);background-size:cover;background-position:center;
  filter:brightness(0.45) saturate(0.8);
  transform:scale(1.02);
}
.vignette{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(5,2,1,.85) 100%);
  pointer-events:none;z-index:1;
}

.museum-header{
  position:absolute;top:0;left:0;right:0;height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(to bottom,rgba(6,3,1,.96),rgba(6,3,1,.8));
  border-bottom:1px solid rgba(212,168,67,.3);
  z-index:20;
  padding:0 2rem;
}
.header-logo{
  display:flex;
  align-items:center;
  gap:0.7rem;
  width: 210px;
  flex-shrink:0;
}
.logo-img{
  height:48px;
  width:auto;
  filter:drop-shadow(0 0 4px rgba(0,0,0,0.5));
}
.logo-text{
  font-family:'ModernoTwo', 'Cinzel Decorative', serif;
  font-weight:normal;
  font-size:clamp(0.85rem, 1.6vw, 1.1rem);
  line-height:1.2;
  letter-spacing:0.05em;
  color:white;
  text-transform:uppercase;
  white-space:pre-line;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 48px;
}
.header-center{
  text-align:center;
  flex: 1;
  display: flex;
  justify-content: center;
}
.header-top{
  font-family:"Jura", sans-serif;
  font-weight:500;
  font-size:clamp(0.75rem, 1.8vw, 1.2rem);
  letter-spacing:.15em;
  color:var(--gold-light);
  text-shadow:0 0 12px rgba(212,168,67,.5);
  text-transform:uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-placeholder{
  width: 210px;
  flex-shrink:0;
  visibility: hidden;
}
.header-rule{
  position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.museum-footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:var(--footer-h);
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  gap: 0.35rem;
  background:linear-gradient(to top,rgba(6,3,1,.95),rgba(6,3,1,.7));
  border-top:1px solid rgba(212,168,67,.25);
  z-index:20;
  padding: 0.5rem 0;
}
.nav-tab-name{
  font-family:"Jura", sans-serif;
  font-size:clamp(0.65rem, 1vw, 0.8rem);
  letter-spacing:.1em;
  color:var(--gold-light);
  text-align:center;
  text-transform:uppercase;
}
.nav-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
}
.nav-arrow{
  background:none;
  border:1px solid var(--gold-dark);
  color:var(--gold);
  width:34px;
  height:34px;
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  font-family:serif;
  border-radius: 2px;
}
.nav-arrow:hover{background:var(--gold-dark);color:var(--dark);}
.nav-arrow:disabled{opacity:.25;cursor:default;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;
  background:rgba(212,168,67,.3);
  border:1px solid var(--gold-dark);
  cursor:pointer;
  transition:all .3s;
}
.nav-dot.active{background:var(--gold);box-shadow:0 0 7px rgba(212,168,67,.6);}
.nav-dot:only-child{display:none;}

.museum-layout{
  position:absolute;
  top:var(--header-h);
  bottom:var(--footer-h);
  left:0;right:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  z-index:10;
}

.left-panel{
  position:relative;
  background:linear-gradient(to right,rgba(5,2,1,.3) 0%,transparent 100%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.cat-title{
  flex-shrink:0;
  text-align:center;
  padding: 1.6rem 1rem 0.8rem;
}
.cat-title h2{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(1rem, 2vw, 1.5rem);
  color:var(--gold-light);
  text-shadow:0 0 16px rgba(212,168,67,.45);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.cat-title .rule{
  width:60%;height:1px;margin:0.6rem auto 0.2rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}
.collage-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  margin:0 6px 6px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-dark) rgba(0,0,0,0.3);
  padding: 1.5rem 0.5rem 1rem;
}
.collage-area::-webkit-scrollbar{width:6px;}
.collage-area::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);border-radius:3px;}
.collage-area::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px;}

.historic-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1rem;
  align-items:center;
  justify-items:center;
  width:100%;
}
.historic-col{
  display:flex;
  flex-direction:column;
  gap:1rem;
  width:100%;
}
.historic-item{
  width:100%;
  max-width:240px;
  margin:0 auto;
  cursor:pointer;
  transition:all 0.25s ease;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}
.historic-item:hover{
  filter:drop-shadow(0 0 14px rgba(212,168,67,0.7));
  transform:scale(1.01);
}
.historic-item img{
  width:100%;
  height:auto;
  display:block;
  border-radius:3px;
  background:rgba(0,0,0,0.2);
}

.right-panel{
  display:flex;
  flex-direction:column;
  align-items: center;
  justify-content: center;
  padding: 1rem 1.2rem;
  background:linear-gradient(to left,rgba(5,2,1,.3) 0%,transparent 100%);
  overflow: hidden;
  gap: 0.8rem;
}
.detail-frame-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width: 100%;
  flex-shrink: 0;
  position: relative;
}
.detail-frame-wrap img {
  max-width: 391px;
  max-height: 55vh;
  width: auto;
  height: auto;
  object-fit: contain;
  filter:
    drop-shadow(0 0 18px rgba(255, 210, 120, 0.18))
    drop-shadow(0 0 6px rgba(255, 200, 100, 0.10))
    drop-shadow(8px 14px 32px rgba(0,0,0,.85));
  border-radius:4px;
}
.detail-frame-wrap img.winky-portrait {
  max-width: 295px;
  max-height: 55vh;
}

.detail-info{
  width: 100%;
  max-width: 391px;
  background:linear-gradient(to bottom,rgba(14,7,3,.93),rgba(20,10,4,.96));
  border:1px solid rgba(212,168,67,.3);
  border-top:2px solid var(--gold-dark);
  border-bottom:2px solid var(--gold-dark);
  padding: 0.6rem 1.2rem 0.8rem;
  position:relative;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.detail-info::before,.detail-info::after{
  content:'✦';
  position:absolute;
  color:var(--gold-dark);
  font-size:.55rem;
  line-height:1;
}
.detail-info::before{top:5px;left:8px;}
.detail-info::after{top:5px;right:8px;}

.detail-header {
  flex-shrink: 0;
}
.di-owner{
  font-family:"Jura", sans-serif;
  font-weight:400;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  color:var(--gold-dark);
  text-align:center;
  margin-bottom:0.1rem;
}
.di-name{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(0.9rem, 1.6vw, 1.25rem);
  color:var(--gold-light);
  text-align:center;
  margin-bottom:0.2rem;
  text-transform:uppercase;
}
.di-rule{
  width:65%;
  height:1px;
  margin:0.2rem auto 0.4rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.detail-text-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(139, 105, 20, 0.4) transparent;
  margin-top: 0.1rem;
  padding-right: 0.3rem;
  max-height: 120px;
}
.detail-text-scroll::-webkit-scrollbar {
  width: 3px;
}
.detail-text-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.detail-text-scroll::-webkit-scrollbar-thumb {
  background: rgba(139, 105, 20, 0.35);
  border-radius: 2px;
  transition: background 0.3s;
}
.detail-text-scroll:hover::-webkit-scrollbar-thumb {
  background: rgba(212, 168, 67, 0.6);
}
.di-text{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(0.7rem, 1.2vw, 0.85rem);
  line-height:1.45;
  color:var(--cream-dim);
  text-align:center;
  margin: 0;
}

/* Мобильные стрелки по бокам от портрета (без рамок и фона) */
@media (max-width: 700px) {
  .museum-layout {
    grid-template-columns: 1fr;
  }
  .left-panel {
    display: none;
  }
  .right-panel {
    padding: 1rem;
    gap: 0.6rem;
    justify-content: flex-start;
    padding-top: 1.2rem;
  }
  .detail-info {
    max-width: 88vw;
  }
  
  /* Контейнер для портрета и боковых стрелок */
  .detail-frame-wrap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
  }
  .portrait-arrow {
    background: transparent;
    border: none;
    color: rgba(212, 168, 67, 0.65);
    font-size: 2.4rem;
    font-weight: 300;
    width: 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
    font-family: serif;
  }
  .portrait-arrow:active {
    color: var(--gold-light);
    opacity: 0.9;
  }
  .portrait-arrow.disabled {
    opacity: 0.15;
    pointer-events: none;
    color: rgba(212, 168, 67, 0.3);
  }
  .detail-frame-wrap img {
    max-width: 65vw;
    max-height: 52vh;
    width: auto;
  }
  .detail-frame-wrap img.winky-portrait {
    max-width: 45vw;
    max-height: 52vh;
  }
  /* Нижние кнопки категорий остаются без изменений */
  .nav-controls {
    gap: 2rem;
  }
  .nav-arrow {
    width: 40px;
    height: 40px;
    font-size: 1.1rem;
  }
  .logo-img {
    height: 36px;
  }
  .logo-text {
    height: 36px;
    font-size: 0.7rem;
  }
  .header-logo, .header-placeholder {
    width: 150px;
  }
  .header-top {
    letter-spacing: 0.05em;
  }
  .collage-area {
    padding: 0.8rem 0.5rem 1rem;
  }
}

@media (min-width: 701px) and (max-width: 1100px) {
  .right-panel {
    justify-content: flex-start;
    padding-top: 1.4rem;
    gap: 0.7rem;
  }
  .detail-frame-wrap img {
    max-width: 85%;
    max-height: 48vh;
  }
  .detail-frame-wrap img.winky-portrait {
    max-width: 55%;
    max-height: 48vh;
  }
  .detail-info {
    max-width: 85%;
  }
}
</style>
</head>
<body>

<div id="museum">
  <div class="kitchen-bg"></div>
  <div class="vignette"></div>

  <header class="museum-header">
    <div class="header-logo">
      <img class="logo-img" src="https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/mus_logo.png" alt="Логотип музея">
      <div class="logo-text">КОГТЕВРАНСКИЙ<br>МУЗЕЙ</div>
    </div>
    <div class="header-center">
      <div class="header-top">Крыло Домовых Эльфов</div>
    </div>
    <div class="header-placeholder"></div>
    <div class="header-rule"></div>
  </header>

  <div class="museum-layout">
    <div class="left-panel">
      <div class="cat-title"><h2 id="catTitle">Исторические эльфы</h2><div class="rule"></div></div>
      <div class="collage-area" id="collageArea"></div>
    </div>

    <div class="right-panel" id="rightPanel">
      <!-- Контейнер, в который динамически будет помещаться портрет + кнопки (на мобилках) -->
      <div class="detail-frame-wrap" id="detailFrameWrap"></div>
      <div class="detail-info" id="detailInfo">
        <div class="detail-header">
          <div class="di-name" id="diName">—</div>
          <div class="di-owner" id="diOwner"></div>
          <div class="di-rule"></div>
        </div>
        <div class="detail-text-scroll">
          <p class="di-text" id="diText">Выберите портрет слева</p>
        </div>
      </div>
    </div>
  </div>

  <footer class="museum-footer">
    <div class="nav-tab-name" id="navTabName">Исторические эльфы</div>
    <div class="nav-controls">
      <button class="nav-arrow" id="btnPrev">◀</button>
      <div class="nav-dots" id="navDots"></div>
      <button class="nav-arrow" id="btnNext">▶</button>
    </div>
  </footer>
</div>

<script>
const historicElves = [
  { id:'pohleba',  name:'Похлёба', owner:'Хэпзиба Смит', fullImg:'https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/history/pohleba.png', text:'Ложно обвинённая в убийстве хозяйки эльфийка.' },
  { id:'kreacher', name:'Кикимер', owner:'Блэки', fullImg:'https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/history/kikimer.png', text:'Был до конца верен семье Блэк, а в частности Регулусу Блэку. Смог выполнить последнее поручение хозяина и унёс крестраж Тёмного Лорда из пещеры, но не мог его уничтожить.' },
  { id:'dobby',    name:'Добби', owner:'Свободный эльф (ранее Малфои)', fullImg:'https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/history/dobby.png', text:'Первый известный свободный эльф, который желал этой свободы. Первый эльф, начавший получать зарплату и выходные. Был освобождён семьёй Малфой. Умер, защищая друзей. Именно в его честь был организован праздник «День Домового Эльфа».' },
  { id:'winky',    name:'Винки', owner:'Свободный эльф (ранее Краучи)', fullImg:'https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/history/winki.png', text:'Появилась в Хогвартсе вместе с Добби после того, как её выгнали из служения Краучам. Была верна своим бывшим хозяевам и после освобождения. Долго пьянствовала из-за горя на свободе, но потихоньку начала оправляться и в итоге участвовала в Битве за Хогвартс среди эльфов, выступивших против Пожирателей Смерти. От пьянства не избавилась, но стала пить гораздо меньше, вернувшись в работу.' }
];

const otherTabs = [
  { label:'Эльфы Хогвартса', items:[
    { id:'teddy', name:'Тедди', owner:'Кухни Хогвартса', text:'Легендарный повар Большого зала. Готовил пиры для четырёх факультетов.' },
    { id:'thomas', name:'Томас', owner:'Подземелья', text:'Хранитель винных подвалов, знаток выдержанных элей.' }
  ]},
  { label:'Тарелки', items:[
    { id:'rocky', name:'Рокки', owner:'Фарфоровая мастерская', text:'Мастер посуды, его тарелки никогда не бьются.' }
  ]}
];

const sections = [
  { type:'historic', label:'Исторические эльфы', data: historicElves },
  ...otherTabs.map(tab => ({ type:'default', label: tab.label, data: tab.items }))
];

let currentSectionIdx = 0;
let currentItemId = null;
let currentItem = null; // для быстрого доступа

const collageArea = document.getElementById('collageArea');
const detailFrameWrap = document.getElementById('detailFrameWrap');
const diName = document.getElementById('diName');
const diOwner = document.getElementById('diOwner');
const diText = document.getElementById('diText');
const catTitle = document.getElementById('catTitle');
const navTabName = document.getElementById('navTabName');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const navDots = document.getElementById('navDots');

function isMobile() {
  return window.innerWidth <= 700;
}

// Отображение портрета и, при необходимости, стрелок по бокам
function renderPortrait(item) {
  if (!item) return;
  const mobile = isMobile();
  detailFrameWrap.innerHTML = '';
  
  if (mobile) {
    // Мобильная версия: создаём контейнер с двумя кнопками и изображением посередине
    const leftArrow = document.createElement('button');
    leftArrow.textContent = '‹';
    leftArrow.className = 'portrait-arrow';
    leftArrow.setAttribute('aria-label', 'Предыдущий портрет');
    const rightArrow = document.createElement('button');
    rightArrow.textContent = '›';
    rightArrow.className = 'portrait-arrow';
    rightArrow.setAttribute('aria-label', 'Следующий портрет');
    
    let img;
    if (sections[currentSectionIdx].type === 'historic' && item.fullImg) {
      img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
    } else {
      img = document.createElement('div');
      img.style.fontSize = '5rem';
      img.style.opacity = '0.7';
      img.textContent = '🧝';
    }
    
    detailFrameWrap.appendChild(leftArrow);
    detailFrameWrap.appendChild(img);
    detailFrameWrap.appendChild(rightArrow);
    
    // Обновляем активность кнопок (вкл/выкл)
    const data = sections[currentSectionIdx].data;
    const idx = data.findIndex(i => i.id === currentItemId);
    if (idx <= 0) leftArrow.classList.add('disabled');
    else leftArrow.classList.remove('disabled');
    if (idx >= data.length - 1) rightArrow.classList.add('disabled');
    else rightArrow.classList.remove('disabled');
    
    // Обработчики
    leftArrow.onclick = (e) => {
      e.stopPropagation();
      const newIdx = idx - 1;
      if (newIdx >= 0) selectItem(data[newIdx].id);
    };
    rightArrow.onclick = (e) => {
      e.stopPropagation();
      const newIdx = idx + 1;
      if (newIdx < data.length) selectItem(data[newIdx].id);
    };
  } else {
    // Десктопная версия: только изображение (без стрелок)
    if (sections[currentSectionIdx].type === 'historic' && item.fullImg) {
      const img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
      detailFrameWrap.appendChild(img);
    } else {
      const placeholder = document.createElement('div');
      placeholder.style.fontSize = '5rem';
      placeholder.style.opacity = '0.7';
      placeholder.textContent = '🧝';
      detailFrameWrap.appendChild(placeholder);
    }
  }
}

function selectItem(id) {
  currentItemId = id;
  const section = sections[currentSectionIdx];
  const item = section.data.find(i => i.id === id);
  if (!item) return;
  currentItem = item;
  
  // Отрисовка портрета со стрелками или без
  renderPortrait(item);
  
  // Заполнение текстовой информации
  diName.textContent = item.name;
  diOwner.textContent = item.owner || '';
  diText.textContent = item.text;
}

function renderCollage() {
  const section = sections[currentSectionIdx];
  collageArea.innerHTML = '';
  if (section.type === 'historic') {
    const grid = document.createElement('div'); grid.className = 'historic-grid';
    const pohleba = section.data.find(e=>e.id==='pohleba');
    const kreacher = section.data.find(e=>e.id==='kreacher');
    const dobby = section.data.find(e=>e.id==='dobby');
    const winky = section.data.find(e=>e.id==='winky');
    const col1 = document.createElement('div'); col1.className='historic-col';
    if(pohleba) col1.appendChild(createHistoricCard(pohleba));
    const col2 = document.createElement('div'); col2.className='historic-col';
    if(kreacher) col2.appendChild(createHistoricCard(kreacher));
    if(dobby) col2.appendChild(createHistoricCard(dobby));
    const col3 = document.createElement('div'); col3.className='historic-col';
    if(winky) col3.appendChild(createHistoricCard(winky));
    grid.append(col1, col2, col3);
    collageArea.appendChild(grid);
  } else {
    const grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(140px, 1fr))';
    grid.style.gap = '1rem';
    grid.style.padding = '0.5rem';
    section.data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'default-card';
      card.id = `card-${item.id}`;
      card.style.background = 'rgba(0,0,0,0.4)';
      card.style.borderRadius = '8px';
      card.style.padding = '0.5rem';
      card.style.textAlign = 'center';
      card.style.cursor = 'pointer';
      card.innerHTML = `<div style="font-size:3rem;">🧝</div><div style="font-family:Jura,sans-serif;color:var(--gold-light);">${item.name}</div>`;
      card.onclick = () => selectItem(item.id);
      grid.appendChild(card);
    });
    collageArea.appendChild(grid);
  }
}

function createHistoricCard(elf) {
  const card = document.createElement('div');
  card.className = 'historic-item';
  card.id = `cf-${elf.id}`;
  card.onclick = () => selectItem(elf.id);
  const img = document.createElement('img');
  img.src = elf.fullImg;
  img.alt = elf.name;
  card.appendChild(img);
  return card;
}

function updateNav() {
  catTitle.textContent = sections[currentSectionIdx].label;
  navTabName.textContent = sections[currentSectionIdx].label;
  updateBottomArrows();
  navDots.innerHTML = '';
  sections.forEach((_,idx) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (idx === currentSectionIdx ? ' active' : '');
    dot.onclick = () => goToSection(idx);
    navDots.appendChild(dot);
  });
  renderCollage();
  const data = sections[currentSectionIdx].data;
  if(data.length) {
    selectItem(data[0].id);
  } else {
    detailFrameWrap.innerHTML = '<div style="font-size:2rem;">🧹</div>';
    diName.textContent = '—';
    diOwner.textContent = '';
    diText.textContent = 'Нет экспонатов';
  }
}

function goToSection(idx) {
  if(idx>=0 && idx<sections.length) {
    currentSectionIdx = idx;
    updateNav();
  }
}

function updateBottomArrows() {
  btnPrev.disabled = (currentSectionIdx === 0);
  btnNext.disabled = (currentSectionIdx === sections.length - 1);
}

// Обработчики нижних кнопок (переключение категорий)
btnPrev.onclick = () => goToSection(currentSectionIdx - 1);
btnNext.onclick = () => goToSection(currentSectionIdx + 1);

// Свайп для мобильных (перелистывание портретов)
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!isMobile()) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
  const data = sections[currentSectionIdx].data;
  const idx = data.findIndex(i => i.id === currentItemId);
  if (dx < 0 && idx < data.length - 1) selectItem(data[idx + 1].id);
  if (dx > 0 && idx > 0) selectItem(data[idx - 1].id);
}, { passive: true });

// Адаптация при изменении размера окна (перерисовка портрета без потери выбранного элемента)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    renderCollage();
    if (currentItemId) {
      const section = sections[currentSectionIdx];
      const item = section.data.find(i => i.id === currentItemId);
      if (item) renderPortrait(item);
    }
  }, 150);
});

// Инициализация
updateNav();
</script>
</body>
</html>
