<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Крыло Домовых Эльфов · Исторические портреты</title>
<link rel="icon" type="image/x-icon" href="/gift/house-elf/2026/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'ModernoTwo';
  src: url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/ofont.ru_Moderno%20Two.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root{
  --gold:#D4A843; --gold-light:#F0C860; --gold-dark:#8B6914;
  --cream:#F5E6C8; --cream-dim:#C8A878; --dark:#110A04; --ink:#2A1A0A;
  --fon:url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/kitchen_fon.png');
  --header-h:76px; --footer-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  font-family:'Cormorant Garamond',serif;color:var(--cream);}

#museum{position:fixed;inset:0;opacity:1;pointer-events:all;}
.kitchen-bg{position:absolute;inset:0;
  background-image:var(--fon);background-size:cover;background-position:center;
  filter:brightness(0.45) saturate(0.8);
  transform:scale(1.02);
}
.vignette{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(5,2,1,.85) 100%);
  pointer-events:none;z-index:1;
}

.museum-header{
  position:absolute;top:0;left:0;right:0;height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(to bottom,rgba(6,3,1,.96),rgba(6,3,1,.8));
  border-bottom:1px solid rgba(212,168,67,.3);
  z-index:20;
  padding:0 2rem;
}
.header-logo{
  display:flex;
  align-items:center;
  gap:0.7rem;
  width: 210px;
  flex-shrink:0;
}
.logo-img{
  height:48px;
  width:auto;
  filter:drop-shadow(0 0 4px rgba(0,0,0,0.5));
}
.logo-text{
  font-family:'ModernoTwo', 'Cinzel Decorative', serif;
  font-weight:normal;
  font-size:clamp(0.85rem, 1.6vw, 1.1rem);
  line-height:1.2;
  letter-spacing:0.05em;
  color:white;
  text-transform:uppercase;
  white-space:pre-line;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 48px;
}
.header-center{
  text-align:center;
  flex: 1;
  display: flex;
  justify-content: center;
}
.header-top{
  font-family:"Jura", sans-serif;
  font-weight:500;
  font-size:clamp(0.75rem, 1.8vw, 1.2rem);
  letter-spacing:.15em;
  color:var(--gold-light);
  text-shadow:0 0 12px rgba(212,168,67,.5);
  text-transform:uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-placeholder{
  width: 210px;
  flex-shrink:0;
  visibility: hidden;
}
.header-rule{
  position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.museum-footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:var(--footer-h);
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  gap: 0.35rem;
  background:linear-gradient(to top,rgba(6,3,1,.95),rgba(6,3,1,.7));
  border-top:1px solid rgba(212,168,67,.25);
  z-index:20;
  padding: 0.5rem 0;
}
.nav-tab-name{
  font-family:"Jura", sans-serif;
  font-size:clamp(0.65rem, 1vw, 0.8rem);
  letter-spacing:.1em;
  color:var(--gold-light);
  text-align:center;
  text-transform:uppercase;
}
.nav-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
}
.nav-arrow{
  background:none;
  border:1px solid var(--gold-dark);
  color:var(--gold);
  width:34px;
  height:34px;
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  font-family:serif;
  border-radius: 2px;
}
.nav-arrow:hover{background:var(--gold-dark);color:var(--dark);}
.nav-arrow:disabled{opacity:.25;cursor:default;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;
  background:rgba(212,168,67,.3);
  border:1px solid var(--gold-dark);
  cursor:pointer;
  transition:all .3s;
}
.nav-dot.active{background:var(--gold);box-shadow:0 0 7px rgba(212,168,67,.6);}
.nav-dot:only-child{display:none;}

.museum-layout{
  position:absolute;
  top:var(--header-h);
  bottom:var(--footer-h);
  left:0;right:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  z-index:10;
}

.left-panel{
  position:relative;
  background:linear-gradient(to right,rgba(5,2,1,.3) 0%,transparent 100%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.cat-title{
  flex-shrink:0;
  text-align:center;
  padding: 1.6rem 1rem 0.8rem;
}
.cat-title h2{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(1rem, 2vw, 1.5rem);
  color:var(--gold-light);
  text-shadow:0 0 16px rgba(212,168,67,.45);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.cat-title .subtitle {
  font-family:"Jura", sans-serif;
  font-weight:400;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  color:var(--gold-dark);
  letter-spacing:.04em;
  margin-top:0.25rem;
  font-style:italic;
}
.cat-title .rule{
  width:60%;height:1px;margin:0.6rem auto 0.2rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}
.collage-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  margin:0 6px 6px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-dark) rgba(0,0,0,0.3);
  padding: 1.5rem 0.5rem 1rem;
}
.collage-area::-webkit-scrollbar{width:6px;}
.collage-area::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);border-radius:3px;}
.collage-area::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px;}

.historic-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1rem;
  align-items:center;
  justify-items:center;
  width:100%;
}
.historic-col{
  display:flex;
  flex-direction:column;
  gap:1rem;
  width:100%;
}
.historic-item{
  width:100%;
  max-width:240px;
  margin:0 auto;
  cursor:pointer;
  transition:all 0.25s ease;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}
.historic-item:hover{
  filter:drop-shadow(0 0 14px rgba(212,168,67,0.7));
  transform:scale(1.01);
}
.historic-item img{
  width:100%;
  height:auto;
  display:block;
  border-radius:3px;
  background:rgba(0,0,0,0.2);
}

/* Хаотичная композиция для тарелок */
.chaotic-layout {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 0.3rem 0.2rem;
  align-items: end;
  justify-items: center;
  width: 100%;
  padding: 0.3rem 0.3rem 0.5rem;
}
.plate-card {
  cursor: pointer;
  transition: filter 0.2s ease;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
  background: transparent;
}
.plate-card:hover {
  filter: drop-shadow(0 0 22px rgba(212,168,67,0.8));
}
.plate-card img {
  width: 100%;
  height: auto;
  display: block;
}
.plate-left { width: 85%; grid-column: 1; grid-row: 1 / 3; align-self: center; }
.plate-right { width: 95%; grid-column: 2; grid-row: 1; align-self: start; }
.plate-top { width: 80%; grid-column: 3; grid-row: 1 / 3; align-self: center; }
.plate-bottom { width: 72%; grid-column: 2; grid-row: 2; align-self: start; margin-top: 0.1rem; }

@media (max-width: 700px) {
  .chaotic-layout { gap: 0.2rem; }
  .plate-left, .plate-top, .plate-right, .plate-bottom { width: 90%; }
}

.right-panel{
  display:flex;
  flex-direction:column;
  align-items: center;
  justify-content: center;
  padding: 1rem 1.2rem;
  background:linear-gradient(to left,rgba(5,2,1,.3) 0%,transparent 100%);
  overflow: hidden;
  gap: 0.8rem;
}
.detail-frame-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width: 100%;
  flex-shrink: 0;
  position: relative;
}
.detail-frame-wrap img {
  max-width: 391px;
  max-height: 55vh;
  width: auto;
  height: auto;
  object-fit: contain;
  filter:
    drop-shadow(0 0 18px rgba(255, 210, 120, 0.18))
    drop-shadow(0 0 6px rgba(255, 200, 100, 0.10))
    drop-shadow(8px 14px 32px rgba(0,0,0,.85));
  border-radius:4px;
}
.detail-frame-wrap img.winky-portrait {
  max-width: 295px;
  max-height: 55vh;
}

.detail-info{
  width: 100%;
  max-width: 391px;
  background:linear-gradient(to bottom,rgba(14,7,3,.93),rgba(20,10,4,.96));
  border:1px solid rgba(212,168,67,.3);
  border-top:2px solid var(--gold-dark);
  border-bottom:2px solid var(--gold-dark);
  padding: 0.6rem 1.2rem 0.8rem;
  position:relative;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: max-width 0.3s ease;
}
.detail-info.wide {
  max-width: 520px;
}
.detail-info::before,.detail-info::after{
  content:'✦';
  position:absolute;
  color:var(--gold-dark);
  font-size:.55rem;
  line-height:1;
}
.detail-info::before{top:5px;left:8px;}
.detail-info::after{top:5px;right:8px;}

.detail-header {
  flex-shrink: 0;
}
.di-owner{
  font-family:"Jura", sans-serif;
  font-weight:400;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  color:var(--gold-dark);
  text-align:center;
  margin-bottom:0.1rem;
}
.di-name{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(0.9rem, 1.6vw, 1.25rem);
  color:var(--gold-light);
  text-align:center;
  margin-bottom:0.2rem;
  text-transform:uppercase;
}
.di-rule{
  width:65%;
  height:1px;
  margin:0.2rem auto 0.4rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.detail-text-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(139, 105, 20, 0.4) transparent;
  margin-top: 0.1rem;
  padding-right: 0.3rem;
  max-height: 150px;
}
.detail-text-scroll::-webkit-scrollbar {
  width: 3px;
}
.detail-text-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.detail-text-scroll::-webkit-scrollbar-thumb {
  background: rgba(139, 105, 20, 0.35);
  border-radius: 2px;
}
.detail-text-scroll:hover::-webkit-scrollbar-thumb {
  background: rgba(212, 168, 67, 0.6);
}
.di-text{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(0.7rem, 1.2vw, 0.85rem);
  line-height:1.45;
  color:var(--cream-dim);
  text-align:center;
  margin: 0;
}

/* Мобильная базовая адаптация */
@media (max-width: 700px) {
  .museum-layout {
    grid-template-columns: 1fr;
  }
  .left-panel {
    display: none;
  }
  .right-panel {
    padding: 1rem;
    gap: 0.6rem;
    justify-content: flex-start;
    padding-top: 1.2rem;
    overflow-y: auto;
    overflow-x: hidden;
  }
  /* Для тарелок особенно важно — большое изображение + длинный текст */
  .right-panel .detail-frame-wrap img {
    max-height: 42vh;
  }
  .detail-info {
    max-width: 88vw;
    flex-shrink: 0;
  }
  .detail-text-scroll {
    max-height: 120px;
  }
  
  .detail-frame-wrap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
  }
  .portrait-arrow {
    background: transparent;
    border: none;
    color: rgba(212, 168, 67, 0.65);
    font-size: 2.4rem;
    font-weight: 300;
    width: 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
    font-family: serif;
  }
  .portrait-arrow:active {
    color: var(--gold-light);
    opacity: 0.9;
  }
  .portrait-arrow.disabled {
    opacity: 0.15;
    pointer-events: none;
    color: rgba(212, 168, 67, 0.3);
  }
  .detail-frame-wrap img {
    max-width: 65vw;
    max-height: 52vh;
    width: auto;
  }
  .detail-frame-wrap img.winky-portrait {
    max-width: 45vw;
    max-height: 52vh;
  }
  .nav-controls {
    gap: 2rem;
  }
  .nav-arrow {
    width: 40px;
    height: 40px;
    font-size: 1.1rem;
  }
  .logo-img {
    height: 36px;
  }
  .logo-text {
    height: 36px;
    font-size: 0.7rem;
  }
  .header-logo, .header-placeholder {
    width: 150px;
  }
  .header-top {
    letter-spacing: 0.05em;
  }
}

@media (min-width: 701px) and (max-width: 1100px) {
  .right-panel {
    justify-content: flex-start;
    padding-top: 1.4rem;
    gap: 0.7rem;
  }
  .detail-frame-wrap img {
    max-width: 85%;
    max-height: 48vh;
  }
  .detail-frame-wrap img.winky-portrait {
    max-width: 55%;
    max-height: 48vh;
  }
  .detail-info {
    max-width: 85%;
  }
}

/* ══ ОСНОВНОЙ РЕЖИМ МОДЫ (десктоп) ══ */
.fashion-mode .left-panel { display: none; }
.fashion-mode .museum-layout { grid-template-columns: 1fr; }

.fashion-mode .right-panel {
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  gap: 0;
  padding: 0;
  overflow: hidden;
}

/* Заголовок раздела моды */
.fashion-title {
  flex-shrink: 0;
  text-align: center;
  padding: 1.2rem 1rem 0.6rem;
  width: 100%;
}
.fashion-title h2 {
  font-family: "Jura", sans-serif;
  font-weight: 600;
  font-size: clamp(1rem, 2vw, 1.5rem);
  color: var(--gold-light);
  text-shadow: 0 0 16px rgba(212,168,67,.45);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.fashion-title .rule {
  width: 60%; height: 1px; margin: 0.5rem auto 0;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
}

/* Основная зона: стрелки + viewport слайдера */
.fashion-stage {
  flex: 1;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  overflow: hidden;
  padding: 0 0 0.8rem;
}

/* Viewport — обрезает то, что выезжает; ширина по содержимому тройки */
.fashion-viewport {
  overflow: hidden;
  flex: 0 1 auto;
  max-width: calc(3 * 18vw + 2 * 1.8rem); /* 3 манекена + 2 зазора */
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
  box-sizing: border-box;
}

/* Лента всех манекенов — двигается через translateX */
.fashion-track {
  display: flex;
  flex-direction: row;
  gap: 1.8rem;
  align-items: flex-start;
  justify-content: center;
  will-change: transform;
  width: 100%;
  /* transition задаётся динамически через JS */
}

/* Один манекен + плашка под ним */
.fashion-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  flex: 0 0 auto;
  cursor: pointer;
  min-width: 0;
}
.fashion-unit:hover .fashion-img {
  filter:
    drop-shadow(0 0 22px rgba(212,168,67,0.55))
    drop-shadow(8px 14px 32px rgba(0,0,0,.85));
}

.fashion-img {
  max-height: 54vh;
  max-width: 18vw;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  filter:
    drop-shadow(0 0 18px rgba(255,210,120,.15))
    drop-shadow(0 0 6px rgba(255,200,100,.10))
    drop-shadow(8px 14px 32px rgba(0,0,0,.85));
  transition: filter 0.2s;
}

/* Плашка под манекеном */
.fashion-plate {
  width: 100%;
  background: linear-gradient(to bottom, rgba(14,7,3,.93), rgba(20,10,4,.96));
  border: 1px solid rgba(212,168,67,.3);
  border-top: 2px solid var(--gold-dark);
  border-bottom: 2px solid var(--gold-dark);
  padding: 0.5rem 1.1rem 0.6rem;
  position: relative;
  min-width: 180px;
  max-width: 300px;
  box-sizing: border-box;
}
.fashion-plate::before, .fashion-plate::after {
  content: '✦';
  position: absolute;
  color: var(--gold-dark);
  font-size: .5rem;
  line-height: 1;
}
.fashion-plate::before { top: 4px; left: 6px; }
.fashion-plate::after  { top: 4px; right: 6px; }
.fashion-plate-name {
  font-family: "Jura", sans-serif;
  font-weight: 600;
  font-size: clamp(0.7rem, 1.1vw, 0.95rem);
  color: var(--gold-light);
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 0.1rem;
}
.fashion-plate-designer {
  font-family: "Jura", sans-serif;
  font-size: clamp(0.6rem, 0.9vw, 0.75rem);
  color: var(--gold-dark);
  text-align: center;
  margin-bottom: 0.15rem;
  font-style: italic;
}
.fashion-plate-rule {
  width: 60%; height: 1px; margin: 0.2rem auto 0.3rem;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
}
.fashion-plate-text {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(0.6rem, 0.95vw, 0.75rem);
  line-height: 1.4;
  color: var(--cream-dim);
  text-align: center;
  max-height: 80px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,105,20,.4) transparent;
}
.fashion-plate-text::-webkit-scrollbar { width: 3px; }
.fashion-plate-text::-webkit-scrollbar-thumb { background: rgba(139,105,20,.35); border-radius: 2px; }

.fashion-arrow {
  background: none;
  border: none;
  outline: none;
  box-shadow: none;
  color: rgba(212,168,67,.8);
  font-size: 3.6rem;
  font-family: serif;
  cursor: pointer;
  flex-shrink: 0;
  width: 32px;
  /* центрируем по изображению: 54vh / 2 минус половина кнопки */
  margin-top: calc(27vh - 1.8rem);
  transition: color 0.2s, text-shadow 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
  padding: 0;
  text-shadow: 0 2px 10px rgba(0,0,0,.9);
}
.fashion-arrow:hover {
  color: #f5d97a;
  text-shadow: 0 0 20px rgba(212,168,67,0.9), 0 2px 10px rgba(0,0,0,.9);
  transform: scale(1.18);
}
.fashion-arrow:disabled { opacity: 0.13; cursor: default; transform: none; }

/* ══ ФАКУЛЬТЕТСКИЕ ЭЛЬФЫ: двухрядная раскладка ══ */
.faculty-layout {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
  width: 100%;
  padding: 0.5rem 0.5rem 1rem;
}
/* Верхний ряд: Тедди + Плюш */
.faculty-row-top {
  display: flex;
  flex-direction: row;
  gap: 1rem;
  justify-content: center;
  align-items: flex-end;
  width: 100%;
}
/* Нижний ряд: Нико + Эмма (крупнее) + Саму */
.faculty-row-bottom {
  display: flex;
  flex-direction: row;
  gap: 1rem;

  width: 100%;

.faculty-card {

  transition: filter 0.2s ease, transform 0.2s ease;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55));
  flex-shrink: 0;
}
.faculty-card:hover {
  filter: drop-shadow(0 0 16px rgba(212,168,67,0.75));
  transform: scale(1.02);
}
.faculty-card img {
  display: block;
  height: auto;
  border-radius: 3px;
}
/* Тедди и Саму — верхний ряд */
.faculty-card-small img  { width: clamp(90px, 9vw, 195px); }
/* Нико и Плюш — нижний ряд */
.faculty-card-medium img { width: clamp(100px, 10vw, 210px); }
/* Эмма — центр, крупнее */

.faculty-card-large { align-self: flex-start; }

@media (max-width: 1100px) {

function isMobile()  { return window.innerWidth <= 700; }
function isDesktop() { return window.innerWidth > 1100; }

function renderPortrait(item) {
  if (!item) return;
  const mobile = isMobile();
  detailFrameWrap.innerHTML = '';
  const section = sections[currentSectionIdx];
  const isFashion = section.type === 'fashion';
  
  if (mobile) {
    // Мобильный формат: стрелки по бокам (как у исторических эльфов)
    const leftArrow = document.createElement('button');
    leftArrow.textContent = '‹';
    leftArrow.className = 'portrait-arrow';
    const rightArrow = document.createElement('button');
    rightArrow.textContent = '›';
    rightArrow.className = 'portrait-arrow';
    
    let img;
    const hasImg = (section.type === 'historic' || section.type === 'plates' || section.type === 'faculty' || section.type === 'pasta' || isFashion) && item.fullImg;
    if (hasImg) {
      img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
      if (isFashion) img.classList.add('fashion-img');
    } else {
      img = document.createElement('div');
      img.style.fontSize = '4rem';
      img.textContent = '🧝';
    }
    
    detailFrameWrap.appendChild(leftArrow);
    detailFrameWrap.appendChild(img);
    detailFrameWrap.appendChild(rightArrow);
    
    const data = section.data;
    const idx = data.findIndex(i => i.id === currentItemId);
    leftArrow.classList.toggle('disabled', idx <= 0);
    rightArrow.classList.toggle('disabled', idx >= data.length - 1);
    
    leftArrow.onclick = (e) => { e.stopPropagation(); if(idx > 0) selectItem(data[idx-1].id); };
    rightArrow.onclick = (e) => { e.stopPropagation(); if(idx < data.length-1) selectItem(data[idx+1].id); };
  } 
  else {
    // Десктоп (шире 1100px) — слайдер с тройками
    if (isFashion && item.fullImg && isDesktop()) {
      renderFashionDesktop(item);
      return;
    }
    // Планшет/мобиль для fashion и всё остальное — стандартный вид
    if (isFashion && item.fullImg) {
      // Одиночный манекен со стрелками (как у исторических, но fashion-img)
      const data = section.data;
      const idx = data.findIndex(i => i.id === currentItemId);
      const leftArrow = document.createElement('button');
      leftArrow.textContent = '‹';
      leftArrow.className = 'fashion-arrow';
      leftArrow.disabled = (idx <= 0);
      leftArrow.onclick = () => { if(idx > 0) selectItem(data[idx-1].id); };
      const img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      img.className = 'fashion-img';
      const rightArrow = document.createElement('button');
      rightArrow.textContent = '›';
      rightArrow.className = 'fashion-arrow';
      rightArrow.disabled = (idx >= data.length - 1);
      rightArrow.onclick = () => { if(idx < data.length-1) selectItem(data[idx+1].id); };
      detailFrameWrap.appendChild(leftArrow);
      detailFrameWrap.appendChild(img);
      detailFrameWrap.appendChild(rightArrow);
    }
    else if ((section.type === 'historic' || section.type === 'plates' || section.type === 'faculty' || section.type === 'pasta' || section.type === 'hogwarts') && item.fullImg) {
      const img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
      detailFrameWrap.appendChild(img);
    } 
    else {
      const placeholder = document.createElement('div');
      placeholder.style.fontSize = '5rem';
      placeholder.textContent = '🧝';
      detailFrameWrap.appendChild(placeholder);
    }
  }
}

function selectItem(id) {
  currentItemId = id;
  const section = sections[currentSectionIdx];
  const item = section.data.find(i => i.id === id);
  if (!item) return;
  renderPortrait(item);
  // Для fashion на десктопе плашки рендерятся внутри fashion-unit, не в detail-info
  if (section.type === 'fashion' && isDesktop()) return;
  diName.textContent = item.name;
  diOwner.textContent = item.owner || '';
  diText.textContent = item.text;
}

  return unit;

// Текущий индекс начала видимой тройки
let fashionOffset = 0;
let fashionAnimating = false;

function slideFashionTo(targetIdx) {
  const newOffset = Math.floor(targetIdx / 3) * 3;
  if (newOffset !== fashionOffset) {
    fashionSlide(newOffset);
  }
}

function fashionSlide(newOffset) {
  if (fashionAnimating) return;
  const track = document.querySelector('.fashion-track');
  if (!track) return;

  const direction = newOffset > fashionOffset ? 1 : -1;
  fashionAnimating = true;
  fashionOffset = newOffset;

  const newTrack = document.createElement('div');
  newTrack.className = 'fashion-track';
  newTrack.style.transition = 'none';
  newTrack.style.transform = `translateX(${direction * 100}%)`;

  const slice = fashionElves.slice(fashionOffset, fashionOffset + 3);
  slice.forEach(item => newTrack.appendChild(makeFashionUnit(item)));

  const viewport = document.querySelector('.fashion-viewport');

  // Фиксируем размеры viewport перед анимацией, чтобы не схлопнулся
  const vRect = viewport.getBoundingClientRect();
  viewport.style.width  = vRect.width  + 'px';
  viewport.style.height = vRect.height + 'px';
  viewport.style.position = 'relative';

  track.style.position = 'absolute';
  track.style.top = '0'; track.style.left = '0'; track.style.width = '100%';

  newTrack.style.position = 'absolute';
  newTrack.style.top = '0'; newTrack.style.left = '0'; newTrack.style.width = '100%';

  viewport.appendChild(newTrack);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dur = '380ms';
      const ease = 'cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transition    = `transform ${dur} ${ease}`;
      newTrack.style.transition = `transform ${dur} ${ease}`;
      track.style.transform    = `translateX(${-direction * 100}%)`;
      newTrack.style.transform = 'translateX(0)';

      track.addEventListener('transitionend', () => {
        track.remove();
        // Снимаем фиксацию
        newTrack.style.position = '';
        newTrack.style.top = ''; newTrack.style.left = ''; newTrack.style.width = '';
        viewport.style.position = '';
        viewport.style.width = ''; viewport.style.height = '';
        fashionAnimating = false;
        updateFashionArrows();
      }, { once: true });
    });
  });

  updateFashionArrows();
}

function updateFashionArrows() {
  const leftArrow = document.querySelector('.fashion-arrow-left');
  const rightArrow = document.querySelector('.fashion-arrow-right');
  if (leftArrow)  leftArrow.disabled  = (fashionOffset <= 0);
  if (rightArrow) rightArrow.disabled = (fashionOffset + 3 >= fashionElves.length);
}

function renderFashionDesktop(item) {
  const rightPanel = document.getElementById('rightPanel');
  const detailInfo = document.getElementById('detailInfo');
  detailInfo.style.display = 'none';
  detailFrameWrap.style.display = 'none';

  // Если stage уже построен — только обновляем стрелки
  if (rightPanel.querySelector('.fashion-stage')) {
    updateFashionArrows();
    return;
  }

  // Сбрасываем offset при первом входе в раздел
  fashionOffset = 0;
  fashionAnimating = false;

  // Убираем старые элементы
  const oldStage = rightPanel.querySelector('.fashion-stage');
  if (oldStage) oldStage.remove();
  const oldTitle = rightPanel.querySelector('.fashion-title');
  if (oldTitle) oldTitle.remove();

  // Заголовок
  const titleEl = document.createElement('div');
  titleEl.className = 'fashion-title';
  titleEl.innerHTML = '<h2>Эльфийская мода</h2><div class="rule"></div>';

  // Stage
  const stage = document.createElement('div');
  stage.className = 'fashion-stage';

  const leftArrow = document.createElement('button');
  leftArrow.textContent = '‹';
  leftArrow.className = 'fashion-arrow fashion-arrow-left';
  leftArrow.disabled = true;
  leftArrow.onclick = () => { if (!fashionAnimating) fashionSlide(Math.max(0, fashionOffset - 3)); };

  const viewport = document.createElement('div');
  viewport.className = 'fashion-viewport';

  const track = document.createElement('div');
  track.className = 'fashion-track';

  const slice = fashionElves.slice(0, 3);
  slice.forEach(itm => track.appendChild(makeFashionUnit(itm)));

  viewport.appendChild(track);

  const rightArrow = document.createElement('button');
  rightArrow.textContent = '›';
  rightArrow.className = 'fashion-arrow fashion-arrow-right';
  rightArrow.disabled = (fashionElves.length <= 3);
  rightArrow.onclick = () => { if (!fashionAnimating) fashionSlide(fashionOffset + 3); };

  stage.appendChild(leftArrow);
  stage.appendChild(viewport);
  stage.appendChild(rightArrow);

  rightPanel.insertBefore(titleEl, rightPanel.firstChild);
  rightPanel.appendChild(stage);
}

function updateNav() {
  const sec = sections[currentSectionIdx];
  const sub = sec.subtitle ? `<div class="subtitle">${sec.subtitle}</div>` : '';
  catTitle.innerHTML = sec.label + sub;
  navTabName.textContent = sec.label;
  updateBottomArrows();
  navDots.innerHTML = '';
  sections.forEach((_,idx) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (idx === currentSectionIdx ? ' active' : '');
    dot.onclick = () => goToSection(idx);
    navDots.appendChild(dot);
  });
  const detailInfo = document.getElementById('detailInfo');
  const isFashion = sections[currentSectionIdx].type === 'fashion';

  // Сбрасываем fashion-специфичные элементы при уходе
  if (!isFashion || !isDesktop()) {
    fashionOffset = 0;
    fashionAnimating = false;
    detailInfo.style.display = '';
    detailFrameWrap.style.display = '';
    const rightPanel = document.getElementById('rightPanel');
    const oldStage = rightPanel.querySelector('.fashion-stage');
    if (oldStage) oldStage.remove();
    const oldTitle = rightPanel.querySelector('.fashion-title');
    if (oldTitle) oldTitle.remove();
  }

  if(detailInfo) detailInfo.classList.toggle('wide', sections[currentSectionIdx].type === 'plates');
  collageArea.style.overflowY = (sections[currentSectionIdx].type === 'plates' || sections[currentSectionIdx].type === 'fashion' || sections[currentSectionIdx].type === 'faculty') ? 'hidden' : 'auto';
  document.getElementById('museum').classList.toggle('fashion-mode', sections[currentSectionIdx].type === 'fashion');
  renderCollage();
  const data = sections[currentSectionIdx].data;
  if(data.length) {
    selectItem(data[0].id);
  } else {
    detailFrameWrap.innerHTML = '<div style="font-size:2rem;">🧹</div>';
    diName.textContent = '—';
    diOwner.textContent = '';
    diText.textContent = 'Нет экспонатов';
  }
}

function goToSection(idx) {
  if(idx>=0 && idx<sections.length) {
    currentSectionIdx = idx;
    updateNav();
  }
}

function updateBottomArrows() {
  btnPrev.disabled = (currentSectionIdx === 0);
  btnNext.disabled = (currentSectionIdx === sections.length - 1);
}

btnPrev.onclick = () => goToSection(currentSectionIdx - 1);
btnNext.onclick = () => goToSection(currentSectionIdx + 1);

let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!isMobile()) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
  const data = sections[currentSectionIdx].data;
  const idx = data.findIndex(i => i.id === currentItemId);
  if (dx < 0 && idx < data.length - 1) selectItem(data[idx + 1].id);
  if (dx > 0 && idx > 0) selectItem(data[idx - 1].id);
}, { passive: true });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    renderCollage();
    if (currentItemId) {
      const section = sections[currentSectionIdx];
      const item = section.data.find(i => i.id === currentItemId);
      if (item) renderPortrait(item);
    }
  }, 150);
});

updateNav();
</script>
</body>
</html>
