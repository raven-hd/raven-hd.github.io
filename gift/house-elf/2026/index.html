<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Зал Домовых Эльфов · Исторические портреты</title>
<link rel="icon" type="image/x-icon" href="/gift/house-elf/2026/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'ModernoTwo';
  src: url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/ofont.ru_Moderno%20Two.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root{
  --gold:#D4A843; --gold-light:#F0C860; --gold-dark:#8B6914;
  --cream:#F5E6C8; --cream-dim:#C8A878; --dark:#110A04; --ink:#2A1A0A;
  --fon:url('https://raw.githubusercontent.com/raven-hd/raven-hd.github.io/refs/heads/main/gift/house-elf/2026/kitchen_fon.png');
  --header-h:76px; --footer-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  font-family:'Cormorant Garamond',serif;color:var(--cream);}

#museum{position:fixed;inset:0;opacity:1;pointer-events:all;}
.kitchen-bg{position:absolute;inset:0;
  background-image:var(--fon);background-size:cover;background-position:center;
  filter:brightness(0.45) saturate(0.8);
  transform:scale(1.02);
}
.vignette{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(5,2,1,.85) 100%);
  pointer-events:none;z-index:1;
}

.museum-header{
  position:absolute;top:0;left:0;right:0;height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(to bottom,rgba(6,3,1,.96),rgba(6,3,1,.8));
  border-bottom:1px solid rgba(212,168,67,.3);
  z-index:20;
  padding:0 2rem;
}
.header-logo{
  display:flex;
  align-items:center;
  gap:0.7rem;
  width: 210px;
  flex-shrink:0;
}
.logo-img{
  height:48px;
  width:auto;
  filter:drop-shadow(0 0 4px rgba(0,0,0,0.5));
}
.logo-text{
  font-family:'ModernoTwo', 'Cinzel Decorative', serif;
  font-weight:normal;
  font-size:clamp(0.85rem, 1.6vw, 1.1rem);
  line-height:1.2;
  letter-spacing:0.05em;
  color:white;
  text-transform:uppercase;
  white-space:pre-line;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 48px;
}
.header-center{
  text-align:center;
  flex: 1;
  display: flex;
  justify-content: center;
}
.header-top{
  font-family:"Jura", sans-serif;
  font-weight:500;
  font-size:clamp(0.75rem, 1.8vw, 1.2rem);
  letter-spacing:.15em;
  color:var(--gold-light);
  text-shadow:0 0 12px rgba(212,168,67,.5);
  text-transform:uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-placeholder{
  width: 210px;
  flex-shrink:0;
  visibility: hidden;
}
.header-rule{
  position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.museum-footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:var(--footer-h);
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  gap: 0.35rem;
  background:linear-gradient(to top,rgba(6,3,1,.95),rgba(6,3,1,.7));
  border-top:1px solid rgba(212,168,67,.25);
  z-index:20;
  padding: 0.5rem 0;
}
.nav-tab-name{
  font-family:"Jura", sans-serif;
  font-size:clamp(0.65rem, 1vw, 0.8rem);
  letter-spacing:.1em;
  color:var(--gold-light);
  text-align:center;
  text-transform:uppercase;
}
.nav-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
}
.nav-arrow{
  background:none;
  border:1px solid var(--gold-dark);
  color:var(--gold);
  width:34px;
  height:34px;
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  font-family:serif;
  border-radius: 2px;
}
.nav-arrow:hover{background:var(--gold-dark);color:var(--dark);}
.nav-arrow:disabled{opacity:.25;cursor:default;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;
  background:rgba(212,168,67,.3);
  border:1px solid var(--gold-dark);
  cursor:pointer;
  transition:all .3s;
}
.nav-dot.active{background:var(--gold);box-shadow:0 0 7px rgba(212,168,67,.6);}
.nav-dot:only-child{display:none;}

.museum-layout{
  position:absolute;
  top:var(--header-h);
  bottom:var(--footer-h);
  left:0;right:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  z-index:10;
}

.left-panel{
  position:relative;
  background:linear-gradient(to right,rgba(5,2,1,.3) 0%,transparent 100%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.cat-title{
  flex-shrink:0;
  text-align:center;
  padding: 1.6rem 1rem 0.8rem;
}
.cat-title h2{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(1rem, 2vw, 1.5rem);
  color:var(--gold-light);
  text-shadow:0 0 16px rgba(212,168,67,.45);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.cat-title .subtitle {
  font-family:"Jura", sans-serif;
  font-weight:400;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  color:var(--gold-dark);
  letter-spacing:.04em;
  margin-top:0.25rem;
  font-style:italic;
}
.cat-title .rule{
  width:60%;height:1px;margin:0.6rem auto 0.2rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}
.collage-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  margin:0 6px 6px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-dark) rgba(0,0,0,0.3);
  padding: 1.5rem 0.5rem 1rem;
}
.collage-area::-webkit-scrollbar{width:6px;}
.collage-area::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);border-radius:3px;}
.collage-area::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px;}


/* Стили для раздела прессы (десктоп) */
.press-desktop-layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;   /* обе карточки прижаты к верху → выровнены по высоте */
  height: 100%;
  width: 100%;
}
.press-card-large {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}
/* Специальный класс для правой карточки (доска почёта) — увеличенный размер */
.press-card-large-right {
  max-width: 500px;
}
.press-card-large img,
.press-card-large-right img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  background: transparent;
}
/* Фиксированная по высоте область изображения — одинаковая для билля и доски почёта,
   благодаря чему плашки с описаниями начинаются на одной высоте (выровнены) */
.press-img-box {
  width: 100%;
  height: 46vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.2rem;
}
.press-img-box img {
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  border-radius: 6px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  background: transparent;
}
.press-plate {
  width: 100%;
  background: linear-gradient(to bottom, rgba(14,7,3,.93), rgba(20,10,4,.96));
  border: 1px solid rgba(212,168,67,.3);
  border-top: 2px solid var(--gold-dark);
  border-bottom: 2px solid var(--gold-dark);
  padding: 0.6rem 1.2rem 0.8rem;
  position: relative;
}
.press-plate::before,
.press-plate::after {
  content: '✦';
  position: absolute;
  color: var(--gold-dark);
  font-size: .55rem;
  line-height: 1;
}
.press-plate::before { top: 5px; left: 8px; }
.press-plate::after  { top: 5px; right: 8px; }
.press-plate-name {
  font-family: "Jura", sans-serif;
  font-weight: 600;
  font-size: clamp(0.9rem, 1.6vw, 1.2rem);
  color: var(--gold-light);
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 0.15rem;
}
.press-plate-owner {
  font-family: "Jura", sans-serif;
  font-weight: 400;
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  color: var(--gold-dark);
  text-align: center;
  font-style: italic;
  margin-bottom: 0.1rem;
}
.press-plate-rule {
  width: 65%;
  height: 1px;
  margin: 0.3rem auto 0.4rem;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
}
.press-plate-text {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(0.7rem, 1.2vw, 0.85rem);
  line-height: 1.45;
  color: var(--cream-dim);
  text-align: center;
  max-height: 200px;
  overflow-y: auto;
  padding-right: 0.5rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,105,20,.4) transparent;
}
.press-plate-text::-webkit-scrollbar {
  width: 4px;
}
.press-plate-text::-webkit-scrollbar-track {
  background: transparent;
}
.press-plate-text::-webkit-scrollbar-thumb {
  background: rgba(139,105,20,.4);
  border-radius: 4px;
}
.press-plate-text a {
  color: var(--gold-light);
  text-decoration: underline;
  transition: color 0.2s;
}
.press-plate-text a:hover {
  color: var(--gold);
}

/* Глобальный заголовок для раздела прессы (центрированный) */
.press-global-title {
  position: absolute;
  top: var(--header-h);
  left: 0;
  right: 0;
  text-align: center;
  padding: 1.2rem 1rem 0.6rem;
  z-index: 15;
  pointer-events: none;
}
.press-global-title h2 {
  font-family: "Jura", sans-serif;
  font-weight: 600;
  font-size: clamp(1rem, 2vw, 1.5rem);
  color: var(--gold-light);
  text-shadow: 0 0 16px rgba(212,168,67,.45);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.press-global-title .subtitle {
  font-family: "Jura", sans-serif;
  font-weight: 400;
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  color: var(--gold-dark);
  letter-spacing: .04em;
  margin-top: 0.25rem;
  font-style: italic;
}
.press-global-title .rule {
  width: 60%;
  height: 1px;
  margin: 0.5rem auto 0;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
}

/* Отступ сверху под глобальный заголовок — ОДИНАКОВЫЙ для обеих панелей,
   чтобы билль и доска почёта были выровнены по верхней кромке */
.press-section-active .collage-area,
.press-section-active .right-panel {
  padding-top: calc(1rem + 64px);
}

/* Планшеты и мобильные / масштабированные экраны: пресса в одну колонку,
   показывается одно изображение с листанием (как остальные портреты) */
@media (max-width: 1100px) {
  .press-section-active.museum-layout {
    grid-template-columns: 1fr;
  }
  .press-section-active .left-panel {
    display: none;
  }
  .press-section-active .right-panel {
    padding-top: calc(1rem + 62px);
    justify-content: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
  }
}
@media (max-width: 700px) {
  .press-section-active .right-panel {
    padding-top: calc(0.6rem + 56px);
  }
}

/* Карусель прессы (планшеты / мобильные / масштабированные экраны):
   одно изображение со стрелками-листалками */
@media (max-width: 1100px) {
  .press-section-active .detail-frame-wrap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
  }
  .press-section-active .portrait-arrow {
    background: transparent;
    border: none;
    color: rgba(212, 168, 67, 0.65);
    font-size: 2.4rem;
    font-weight: 300;
    width: 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
    font-family: serif;
  }
  .press-section-active .portrait-arrow:active {
    color: var(--gold-light);
    opacity: 0.9;
  }
  .press-section-active .portrait-arrow.disabled {
    opacity: 0.15;
    pointer-events: none;
    color: rgba(212, 168, 67, 0.3);
  }
  .press-carousel-img {
    max-width: 60vw;
    max-height: 44vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    border-radius: 6px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    background: transparent;
  }
  .press-section-active .detail-info {
    max-width: 88vw;
    flex-shrink: 0;
  }
}
@media (max-width: 700px) {
  .press-carousel-img {
    max-width: 72vw;
    max-height: 46vh;
  }
}


.historic-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1rem;
  align-items:center;
  justify-items:center;
  width:100%;
}
.historic-col{
  display:flex;
  flex-direction:column;
  gap:1rem;
  width:100%;
}
.historic-item{
  width:100%;
  max-width:240px;
  margin:0 auto;
  cursor:pointer;
  transition:all 0.25s ease;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}
.historic-item:hover{
  filter:drop-shadow(0 0 14px rgba(212,168,67,0.7));
  transform:scale(1.01);
}
.historic-item img{
  width:100%;
  height:auto;
  display:block;
  border-radius:3px;
  background:rgba(0,0,0,0.2);
}

/* Хаотичная композиция для тарелок */
.chaotic-layout {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 0.3rem 0.2rem;
  align-items: end;
  justify-items: center;
  width: 100%;
  padding: 0.3rem 0.3rem 0.5rem;
}
.plate-card {
  cursor: pointer;
  transition: filter 0.2s ease;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
  background: transparent;
}
.plate-card:hover {
  filter: drop-shadow(0 0 22px rgba(212,168,67,0.8));
}
.plate-card img {
  width: 100%;
  height: auto;
  display: block;
}
.plate-left { width: 85%; grid-column: 1; grid-row: 1 / 3; align-self: center; }
.plate-right { width: 95%; grid-column: 2; grid-row: 1; align-self: start; }
.plate-top { width: 80%; grid-column: 3; grid-row: 1 / 3; align-self: center; }
.plate-bottom { width: 72%; grid-column: 2; grid-row: 2; align-self: start; margin-top: 0.1rem; }

@media (max-width: 700px) {
  .chaotic-layout { gap: 0.2rem; }
  .plate-left, .plate-top, .plate-right, .plate-bottom { width: 90%; }
}

.right-panel{
  display:flex;
  flex-direction:column;
  align-items: center;
  justify-content: center;
  padding: 1rem 1.2rem;
  background:linear-gradient(to left,rgba(5,2,1,.3) 0%,transparent 100%);
  overflow: hidden;
  gap: 0.8rem;
}
.detail-frame-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width: 100%;
  flex-shrink: 0;
  position: relative;
}
.detail-frame-wrap img {
  max-width: 391px;
  max-height: 55vh;
  width: auto;
  height: auto;
  object-fit: contain;
  filter:
    drop-shadow(0 0 18px rgba(255, 210, 120, 0.18))
    drop-shadow(0 0 6px rgba(255, 200, 100, 0.10))
    drop-shadow(8px 14px 32px rgba(0,0,0,.85));
  border-radius:4px;
}
.detail-frame-wrap img.winky-portrait {
  max-width: 295px;
  max-height: 55vh;
}
.detail-frame-wrap img.inktober-portrait {
  max-width: 420px;
  max-height: 55vh;
}

.detail-info{
  width: 100%;
  max-width: 391px;
  background:linear-gradient(to bottom,rgba(14,7,3,.93),rgba(20,10,4,.96));
  border:1px solid rgba(212,168,67,.3);
  border-top:2px solid var(--gold-dark);
  border-bottom:2px solid var(--gold-dark);
  padding: 0.6rem 1.2rem 0.8rem;
  position:relative;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: max-width 0.3s ease;
}
.detail-info.wide {
  max-width: 520px;
}
.detail-info::before,.detail-info::after{
  content:'✦';
  position:absolute;
  color:var(--gold-dark);
  font-size:.55rem;
  line-height:1;
}
.detail-info::before{top:5px;left:8px;}
.detail-info::after{top:5px;right:8px;}

.detail-header {
  flex-shrink: 0;
}
.di-owner{
  font-family:"Jura", sans-serif;
  font-weight:400;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  color:var(--gold-dark);
  text-align:center;
  margin-bottom:0.1rem;
}
.di-name{
  font-family:"Jura", sans-serif;
  font-weight:600;
  font-size:clamp(0.9rem, 1.6vw, 1.25rem);
  color:var(--gold-light);
  text-align:center;
  margin-bottom:0.2rem;
  text-transform:uppercase;
}
.di-rule{
  width:65%;
  height:1px;
  margin:0.2rem auto 0.4rem;
  background:linear-gradient(to right,transparent,var(--gold-dark),transparent);
}

.detail-text-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(139, 105, 20, 0.4) transparent;
  margin-top: 0.1rem;
  padding-right: 0.3rem;
  max-height: 150px;
}
.detail-text-scroll::-webkit-scrollbar {
  width: 3px;
}
.detail-text-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.detail-text-scroll::-webkit-scrollbar-thumb {
  background: rgba(139, 105, 20, 0.35);
  border-radius: 2px;
}
.detail-text-scroll:hover::-webkit-scrollbar-thumb {
  background: rgba(212, 168, 67, 0.6);
}
.di-text{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(0.7rem, 1.2vw, 0.85rem);
  line-height:1.45;
  color:var(--cream-dim);
  text-align:center;
  margin: 0;
  white-space: pre-line;
}
.di-text a {
  color: var(--gold-light);
  text-decoration: underline;
  transition: color 0.2s;
}
.di-text a:hover {
  color: var(--gold);
}

/* Мобильная базовая адаптация */
@media (max-width: 700px) {
  .museum-layout {
    grid-template-columns: 1fr;
  }
  .left-panel {
    display: none;
  }
  .right-panel {
    padding: 1rem;
    gap: 0.6rem;
    justify-content: flex-start;
    padding-top: 1.2rem;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .right-panel .detail-frame-wrap img {
    max-height: 42vh;
  }
  .detail-info {
    max-width: 88vw;
    flex-shrink: 0;
  }
  .detail-text-scroll {
    max-height: 120px;
  }
  
  .detail-frame-wrap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
  }
  .portrait-arrow {
    background: transparent;
    border: none;
    color: rgba(212, 168, 67, 0.65);
    font-size: 2.4rem;
    font-weight: 300;
    width: 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;

// ── РАЗДЕЛ «ПУБЛИКАЦИИ»: слайдер по принципу «Моды», по одной публикации ──
let pressOffset = 0;
let pressAnimating = false;

// Единичный блок публикации: изображение + плашка (название/источник/текст)
function makePressUnit(item) {
  const unit = document.createElement('div');
  unit.className = 'press-unit';

  const imgBox = document.createElement('div');
  imgBox.className = 'press-unit-imgbox';
  const img = document.createElement('img');
  img.src = item.fullImg;
  img.alt = item.name;
  img.className = 'press-unit-img';
  imgBox.appendChild(img);
  unit.appendChild(imgBox);

  const plate = document.createElement('div');
  plate.className = 'press-unit-plate';
  const pName = document.createElement('div');
  pName.className = 'press-unit-name';
  pName.textContent = item.name;
  plate.appendChild(pName);
  if (item.owner) {
    const pOwner = document.createElement('div');
    pOwner.className = 'press-unit-owner';
    pOwner.textContent = item.owner;
    plate.appendChild(pOwner);
  }
  const rule = document.createElement('div');
  rule.className = 'press-unit-rule';
  plate.appendChild(rule);
  const pText = document.createElement('div');
  pText.className = 'press-unit-text';
  pText.innerHTML = item.text;
  plate.appendChild(pText);
  unit.appendChild(plate);

  return unit;
}

function updatePressArrows() {
  const l = document.querySelector('.press-arrow-left');
  const r = document.querySelector('.press-arrow-right');
  if (l) l.disabled = (pressOffset <= 0);
  if (r) r.disabled = (pressOffset >= pressElves.length - 1);
}

// Анимация листания (две дорожки уезжают/приезжают), как в «Моде», но по одному элементу
function pressSlide(newOffset) {
  if (pressAnimating || newOffset === pressOffset) return;
  const track = document.querySelector('.press-track');
  if (!track) return;
  const direction = newOffset > pressOffset ? 1 : -1;
  pressAnimating = true;
  pressOffset = newOffset;
  currentItemId = pressElves[pressOffset].id;

  const newTrack = document.createElement('div');
  newTrack.className = 'press-track';
  newTrack.style.transition = 'none';
  newTrack.style.transform = `translateX(${direction * 100}%)`;
  newTrack.appendChild(makePressUnit(pressElves[pressOffset]));

  const viewport = document.querySelector('.press-viewport');
  const vRect = viewport.getBoundingClientRect();
  viewport.style.width = vRect.width + 'px';
  viewport.style.height = vRect.height + 'px';
  viewport.style.position = 'relative';
  track.style.position = 'absolute';
  track.style.top = '0'; track.style.left = '0'; track.style.width = '100%';
  newTrack.style.position = 'absolute';
  newTrack.style.top = '0'; newTrack.style.left = '0'; newTrack.style.width = '100%';
  viewport.appendChild(newTrack);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dur = '380ms';
      const ease = 'cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transition = `transform ${dur} ${ease}`;
      newTrack.style.transition = `transform ${dur} ${ease}`;
      track.style.transform = `translateX(${-direction * 100}%)`;
      newTrack.style.transform = 'translateX(0)';
      track.addEventListener('transitionend', () => {
        track.remove();
        newTrack.style.position = '';
        newTrack.style.top = ''; newTrack.style.left = ''; newTrack.style.width = '';
        viewport.style.position = '';
        viewport.style.width = ''; viewport.style.height = '';
        pressAnimating = false;
        updatePressArrows();
      }, { once: true });
    });
  });
  updatePressArrows();
}

// Рендер раздела «Публикации» как слайдер (одна публикация на экране)
function renderPressSlider() {
  // Режим как у «Моды»: одна колонка, левая панель скрыта
  document.getElementById('museum').classList.add('press-mode');
  museumLayout.classList.remove('press-section-active');
  if (pressGlobalTitle) pressGlobalTitle.style.display = 'none';
  const catTitleElem = document.querySelector('.left-panel .cat-title');
  if (catTitleElem) catTitleElem.style.display = 'none';

  // Текущий элемент
  if (!pressElves.find(e => e.id === currentItemId)) currentItemId = pressElves[0].id;
  pressOffset = Math.max(0, pressElves.findIndex(e => e.id === currentItemId));
  pressAnimating = false;

  // Деталь-панель не используется в этом режиме
  detailInfo.style.display = 'none';
  detailFrameWrap.style.display = 'none';

  rightPanel.style.justifyContent = 'flex-start';
  rightPanel.style.padding = '';
  rightPanel.innerHTML = '';

  const sec = sections[currentSectionIdx];
  const subHtml = sec.subtitle ? `<div class="subtitle">${sec.subtitle}</div>` : '';
  const titleEl = document.createElement('div');
  titleEl.className = 'press-fashion-title';
  titleEl.innerHTML = `<h2>${sec.label}</h2>${subHtml}<div class="rule"></div>`;

  const stage = document.createElement('div');
  stage.className = 'press-stage';

  const leftArrow = document.createElement('button');
  leftArrow.textContent = '‹';
  leftArrow.className = 'press-arrow press-arrow-left';
  leftArrow.disabled = (pressOffset <= 0);
  leftArrow.onclick = () => { if (!pressAnimating) pressSlide(Math.max(0, pressOffset - 1)); };

  const viewport = document.createElement('div');
  viewport.className = 'press-viewport';
  const track = document.createElement('div');
  track.className = 'press-track';
  track.appendChild(makePressUnit(pressElves[pressOffset]));
  viewport.appendChild(track);

  const rightArrow = document.createElement('button');
  rightArrow.textContent = '›';
  rightArrow.className = 'press-arrow press-arrow-right';
  rightArrow.disabled = (pressOffset >= pressElves.length - 1);
  rightArrow.onclick = () => { if (!pressAnimating) pressSlide(Math.min(pressElves.length - 1, pressOffset + 1)); };

  stage.appendChild(leftArrow);
  stage.appendChild(viewport);
  stage.appendChild(rightArrow);

  rightPanel.appendChild(titleEl);
  rightPanel.appendChild(stage);
}

function renderPortrait(item) {
  if (!item) return;
  const mobile = isMobile();
  detailFrameWrap.innerHTML = '';
  const section = sections[currentSectionIdx];
  const isFashion = section.type === 'fashion';
  const isInktober = section.type === 'inktober';
  const isPress = section.type === 'press';
  
  if (isPress) {
    renderPressSlider();
    return;
  }
  
  // Для остальных разделов: убираем класс отступа и глобальный заголовок
  museumLayout.classList.remove('press-section-active');
  if (pressGlobalTitle) pressGlobalTitle.style.display = 'none';
  const catTitleElem = document.querySelector('.left-panel .cat-title');
  if (catTitleElem) catTitleElem.style.display = '';
  
  if (mobile) {
    const leftArrow = document.createElement('button');
    leftArrow.textContent = '‹';
    leftArrow.className = 'portrait-arrow';
    const rightArrow = document.createElement('button');
    rightArrow.textContent = '›';
    rightArrow.className = 'portrait-arrow';
    
    let img;
    const hasImg = (section.type === 'historic' || section.type === 'plates' || section.type === 'faculty' || section.type === 'pasta' || section.type === 'inktober' || isFashion) && item.fullImg;
    if (hasImg) {
      img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
      if (isFashion) img.classList.add('fashion-img');
      if (isInktober) img.classList.add('inktober-portrait');
    } else {
      img = document.createElement('div');
      img.style.fontSize = '4rem';
      img.textContent = '🧝';
    }
    
    detailFrameWrap.appendChild(leftArrow);
    detailFrameWrap.appendChild(img);
    detailFrameWrap.appendChild(rightArrow);
    
    const data = section.data;
    const idx = data.findIndex(i => i.id === currentItemId);
    leftArrow.classList.toggle('disabled', idx <= 0);
    rightArrow.classList.toggle('disabled', idx >= data.length - 1);
    
    leftArrow.onclick = (e) => { e.stopPropagation(); if(idx > 0) selectItem(data[idx-1].id); };
    rightArrow.onclick = (e) => { e.stopPropagation(); if(idx < data.length-1) selectItem(data[idx+1].id); };
  } 
  else {
    if (isFashion && item.fullImg && isDesktop()) {
      renderFashionDesktop(item);
      return;
    }
    if (isFashion && item.fullImg) {
      const data = section.data;
      const idx = data.findIndex(i => i.id === currentItemId);
      const leftArrow = document.createElement('button');
      leftArrow.textContent = '‹';
      leftArrow.className = 'fashion-arrow';
      leftArrow.disabled = (idx <= 0);
      leftArrow.onclick = () => { if(idx > 0) selectItem(data[idx-1].id); };
      const img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      img.className = 'fashion-img';
      const rightArrow = document.createElement('button');
      rightArrow.textContent = '›';
      rightArrow.className = 'fashion-arrow';
      rightArrow.disabled = (idx >= data.length - 1);
      rightArrow.onclick = () => { if(idx < data.length-1) selectItem(data[idx+1].id); };
      detailFrameWrap.appendChild(leftArrow);
      detailFrameWrap.appendChild(img);
      detailFrameWrap.appendChild(rightArrow);
      // Заполняем плашку сразу здесь, чтобы не оставалось «чужого» описания
      // из ранее просмотренного раздела (например, при изменении масштаба окна)
      diName.textContent = item.name;
      diOwner.textContent = item.owner || '';
      diText.textContent = item.text;
    }
    else if ((section.type === 'historic' || section.type === 'plates' || section.type === 'faculty' || section.type === 'pasta' || section.type === 'hogwarts' || section.type === 'inktober') && item.fullImg) {
      const img = document.createElement('img');
      img.src = item.fullImg;
      img.alt = item.name;
      if (item.id === 'winky') img.classList.add('winky-portrait');
      if (isInktober) img.classList.add('inktober-portrait');
      detailFrameWrap.appendChild(img);
    } 
    else {
      const placeholder = document.createElement('div');
      placeholder.style.fontSize = '5rem';
      placeholder.textContent = '🧝';
      detailFrameWrap.appendChild(placeholder);
    }
  }
}

function selectItem(id) {
  currentItemId = id;
  const section = sections[currentSectionIdx];
  const item = section.data.find(i => i.id === id);
  if (!item) return;
  renderPortrait(item);
  if (section.type === 'fashion' && isDesktop()) return;
  diName.textContent = item.name;
  diOwner.textContent = item.owner || '';
  if (section.type !== 'press') {
    diText.textContent = item.text;
  }
}

    const enny   = section.data.find(e=>e.id==='enny');
    const helena = section.data.find(e=>e.id==='helena');
    const luci2  = section.data.find(e=>e.id==='luci2');
    const col1 = document.createElement('div'); col1.className='historic-col';
    if (daniel) col1.appendChild(createHistoricCard(daniel));
    if (luci)   col1.appendChild(createHistoricCard(luci));
    const col2 = document.createElement('div'); col2.className='historic-col';
    if (kemerin)col2.appendChild(createHistoricCard(kemerin));
    if (enny)   col2.appendChild(createHistoricCard(enny));
    const col3 = document.createElement('div'); col3.className='historic-col';
    if (helena) col3.appendChild(createHistoricCard(helena));
    if (luci2)  col3.appendChild(createHistoricCard(luci2));
    grid.append(col1, col2, col3);
    collageArea.appendChild(grid);
  }
}

function getDesigner(id) {
  if (id.startsWith('jb_')) return 'Блейк и Джульетта Хелвелл-де-Кур';
  if (id.startsWith('h_'))  return 'Хелена Кейн';
  if (id.startsWith('m_'))  return 'Мерида Морграфт';
  if (id.startsWith('b_'))  return 'Блейк Эллингтон';
  if (id.startsWith('p_'))  return 'Патриция Роксинбург';
  return '';
}

function makeFashionUnit(item) {
  const unit = document.createElement('div');
  unit.className = 'fashion-unit';
  unit.onclick = () => slideFashionTo(fashionElves.findIndex(e => e.id === item.id));
  const img = document.createElement('img');
  img.src = item.fullImg;
  img.alt = item.name;
  img.className = 'fashion-img';
  unit.appendChild(img);
  const plate = document.createElement('div');
  plate.className = 'fashion-plate';
  const pName = document.createElement('div');
  pName.className = 'fashion-plate-name';
  pName.textContent = item.name;
  plate.appendChild(pName);
  const designer = getDesigner(item.id);
  if (designer) {
    const pDes = document.createElement('div');
    pDes.className = 'fashion-plate-designer';
    pDes.textContent = designer;
    plate.appendChild(pDes);
  }
  const rule = document.createElement('div');
  rule.className = 'fashion-plate-rule';
  plate.appendChild(rule);
  const pText = document.createElement('p');
  pText.className = 'fashion-plate-text';
  pText.textContent = item.text;
  plate.appendChild(pText);
  unit.appendChild(plate);
  return unit;
}

let fashionOffset = 0;
let fashionAnimating = false;

function slideFashionTo(targetIdx) {
  const newOffset = Math.floor(targetIdx / 3) * 3;
  if (newOffset !== fashionOffset) fashionSlide(newOffset);
}

function fashionSlide(newOffset) {
  if (fashionAnimating) return;
  const track = document.querySelector('.fashion-track');
  if (!track) return;
  const direction = newOffset > fashionOffset ? 1 : -1;
  fashionAnimating = true;
  fashionOffset = newOffset;
  const newTrack = document.createElement('div');
  newTrack.className = 'fashion-track';
  newTrack.style.transition = 'none';
  newTrack.style.transform = `translateX(${direction * 100}%)`;
  const slice = fashionElves.slice(fashionOffset, fashionOffset + 3);
  slice.forEach(item => newTrack.appendChild(makeFashionUnit(item)));
  const viewport = document.querySelector('.fashion-viewport');
  const vRect = viewport.getBoundingClientRect();
  viewport.style.width  = vRect.width  + 'px';
  viewport.style.height = vRect.height + 'px';
  viewport.style.position = 'relative';
  track.style.position = 'absolute';
  track.style.top = '0'; track.style.left = '0'; track.style.width = '100%';
  newTrack.style.position = 'absolute';
  newTrack.style.top = '0'; newTrack.style.left = '0'; newTrack.style.width = '100%';
  viewport.appendChild(newTrack);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dur = '380ms';
      const ease = 'cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transition    = `transform ${dur} ${ease}`;
      newTrack.style.transition = `transform ${dur} ${ease}`;
      track.style.transform    = `translateX(${-direction * 100}%)`;
      newTrack.style.transform = 'translateX(0)';
      track.addEventListener('transitionend', () => {
        track.remove();
        newTrack.style.position = '';
        newTrack.style.top = ''; newTrack.style.left = ''; newTrack.style.width = '';
        viewport.style.position = '';
        viewport.style.width = ''; viewport.style.height = '';
        fashionAnimating = false;
        updateFashionArrows();
      }, { once: true });
    });
  });
  updateFashionArrows();
}

function updateFashionArrows() {
  const leftArrow = document.querySelector('.fashion-arrow-left');
  const rightArrow = document.querySelector('.fashion-arrow-right');
  if (leftArrow)  leftArrow.disabled  = (fashionOffset <= 0);
  if (rightArrow) rightArrow.disabled = (fashionOffset + 3 >= fashionElves.length);
}

function renderFashionDesktop(item) {
  const rightPanel = document.getElementById('rightPanel');
  const detailInfo = document.getElementById('detailInfo');
  detailInfo.style.display = 'none';
  detailFrameWrap.style.display = 'none';
  if (rightPanel.querySelector('.fashion-stage')) {
    updateFashionArrows();
    return;
  }
  fashionOffset = 0;
  fashionAnimating = false;
  const oldStage = rightPanel.querySelector('.fashion-stage');
  if (oldStage) oldStage.remove();
  const oldTitle = rightPanel.querySelector('.fashion-title');
  if (oldTitle) oldTitle.remove();
  const titleEl = document.createElement('div');
  titleEl.className = 'fashion-title';
  titleEl.innerHTML = '<h2>Эльфийская мода</h2><div class="rule"></div>';
  const stage = document.createElement('div');
  stage.className = 'fashion-stage';
  const leftArrow = document.createElement('button');
  leftArrow.textContent = '‹';
  leftArrow.className = 'fashion-arrow fashion-arrow-left';
  leftArrow.disabled = true;
  leftArrow.onclick = () => { if (!fashionAnimating) fashionSlide(Math.max(0, fashionOffset - 3)); };
  const viewport = document.createElement('div');
  viewport.className = 'fashion-viewport';
  const track = document.createElement('div');
  track.className = 'fashion-track';
  const slice = fashionElves.slice(0, 3);
  slice.forEach(itm => track.appendChild(makeFashionUnit(itm)));
  viewport.appendChild(track);
  const rightArrow = document.createElement('button');
  rightArrow.textContent = '›';
  rightArrow.className = 'fashion-arrow fashion-arrow-right';
  rightArrow.disabled = (fashionElves.length <= 3);
  rightArrow.onclick = () => { if (!fashionAnimating) fashionSlide(fashionOffset + 3); };
  stage.appendChild(leftArrow);
  stage.appendChild(viewport);
  stage.appendChild(rightArrow);
  rightPanel.insertBefore(titleEl, rightPanel.firstChild);
  rightPanel.appendChild(stage);
}

function updateNav() {
  const sec = sections[currentSectionIdx];
  // Для прессы заголовок обрабатывается отдельно, стандартный скрываем
  if (sec.type !== 'press') {
    const sub = sec.subtitle ? `<div class="subtitle">${sec.subtitle}</div>` : '';
    catTitle.innerHTML = sec.label + sub;
    // Показываем стандартный заголовок
    const catTitleElem = document.querySelector('.left-panel .cat-title');
    if (catTitleElem) catTitleElem.style.display = '';
    if (pressGlobalTitle) pressGlobalTitle.style.display = 'none';
    museumLayout.classList.remove('press-section-active');
  } else {
    // Для прессы заголовок создаётся в renderPressSlider
    catTitle.innerHTML = ''; // очищаем
  }
  navTabName.textContent = sec.label;
  updateBottomArrows();
  navDots.innerHTML = '';
  sections.forEach((_,idx) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (idx === currentSectionIdx ? ' active' : '');
    dot.onclick = () => goToSection(idx);
    navDots.appendChild(dot);
  });
  const isFashion = sections[currentSectionIdx].type === 'fashion';
  const isPress = sections[currentSectionIdx].type === 'press';
  
  if (!isFashion || !isDesktop()) {
    fashionOffset = 0;
    fashionAnimating = false;
    if (!isPress) {
      detailInfo.style.display = '';
      detailFrameWrap.style.display = '';
    }
    const rightPanel = document.getElementById('rightPanel');
    const oldStage = rightPanel.querySelector('.fashion-stage');
    if (oldStage) oldStage.remove();
    const oldTitle = rightPanel.querySelector('.fashion-title');
    if (oldTitle) oldTitle.remove();
  }
  if(detailInfo) detailInfo.classList.toggle('wide', sections[currentSectionIdx].type === 'plates');
  collageArea.style.overflowY = (sections[currentSectionIdx].type === 'plates' || sections[currentSectionIdx].type === 'fashion' || sections[currentSectionIdx].type === 'faculty' || sections[currentSectionIdx].type === 'press') ? 'hidden' : 'auto';
  document.getElementById('museum').classList.toggle('fashion-mode', sections[currentSectionIdx].type === 'fashion');
  document.getElementById('museum').classList.toggle('press-mode', sections[currentSectionIdx].type === 'press');
  renderCollage();
  const data = sections[currentSectionIdx].data;
  if(data.length && sections[currentSectionIdx].type !== 'press') {
    selectItem(data[0].id);
  } else if (sections[currentSectionIdx].type !== 'press') {
    detailFrameWrap.innerHTML = '<div style="font-size:2rem;">🧹</div>';
    diName.textContent = '—';
    diOwner.textContent = '';
    diText.textContent = 'Нет экспонатов';
  }
}

function goToSection(idx) {
  if(idx>=0 && idx<sections.length) {
    currentSectionIdx = idx;
    updateNav();
  }
}

function updateBottomArrows() {
  btnPrev.disabled = (currentSectionIdx === 0);
  btnNext.disabled = (currentSectionIdx === sections.length - 1);
}

btnPrev.onclick = () => goToSection(currentSectionIdx - 1);
btnNext.onclick = () => goToSection(currentSectionIdx + 1);

let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!isMobile()) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
  const section = sections[currentSectionIdx];
  // Публикации: листаем слайдером с анимацией
  if (section.type === 'press') {
    if (pressAnimating) return;
    if (dx < 0) pressSlide(Math.min(pressElves.length - 1, pressOffset + 1));
    if (dx > 0) pressSlide(Math.max(0, pressOffset - 1));
    return;
  }
  const data = section.data;
  const idx = data.findIndex(i => i.id === currentItemId);
  if (dx < 0 && idx < data.length - 1) selectItem(data[idx + 1].id);
  if (dx > 0 && idx > 0) selectItem(data[idx - 1].id);
}, { passive: true });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    renderCollage();
    if (currentItemId && sections[currentSectionIdx].type !== 'press') {
      const section = sections[currentSectionIdx];
      const item = section.data.find(i => i.id === currentItemId);
      // Используем selectItem, чтобы описание в плашке всегда соответствовало
      // текущему экспонату (а не оставалось от предыдущего раздела)
      if (item) selectItem(currentItemId);
    }
  }, 150);
});

updateNav();
</script>
