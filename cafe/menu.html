:root {
  --blue: #356691;
  --cream: #fff4e6;
  --text: #2a2520;
  --muted: #7a7060;
  --border: rgba(53,102,145,0.18);
  --side-w: 90px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cormorant Garamond', serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; }

/* ── боковая панель ── */
.side {
  width: var(--side-w);
  min-height: 100vh;
  flex-shrink: 0;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  border-right: 2px solid var(--blue);
  padding: 20px 0;
}

.side-menu {
  font-family: 'Lobelia', serif;
  font-size: 52px;
  color: var(--blue);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  letter-spacing: 0.05em;
  line-height: 1;
}

.side-name {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--blue);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  line-height: 1.4;
}

/* ── контент ── */
.content { flex: 1; padding: 28px 28px 120px; }

/* ── заголовок категории ── */
.cat-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--cream);
  background: var(--blue);
  padding: 8px 16px;
  margin: 24px 0 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── сетка позиций ── */
.items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px; }

/* ── позиция ── */
.item { padding: 9px 0; border-bottom: 1px dotted rgba(53,102,145,0.25); display: flex; flex-direction: column; }
.item-top { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
.item-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.item-dots { flex: 1; border-bottom: 1px dotted rgba(53,102,145,0.4); margin: 0 6px 3px; min-width: 20px; }
.item-desc { font-size: 11px; font-style: italic; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
.item-ing  { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.item-ing b { color: var(--blue); text-transform: uppercase; font-size: 9px; letter-spacing: 0.06em; }
.item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 2px; float: right; margin: 0 0 6px 10px; border: 1px solid var(--border); }

/* ── кнопки ── */
.add-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 5px; cursor: pointer; align-self: flex-start;
  font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--cream); background: var(--blue);
  border: none; padding: 5px 12px; border-radius: 2px;
  transition: all .2s; user-select: none;
}
.add-btn:hover { background: #234f73; }
.add-btn.added { background: #1a3050; }
.add-btn .price-tag { font-size: 12px; font-weight: 600; }
.variant .add-btn { margin-top: 0; }

/* варианты */
.variants { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.variant { display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); border-radius: 2px; padding: 3px 8px; }
.variant-label { font-size: 11px; font-weight: 600; color: var(--text); }

/* ── плавающая корзина ── */
.bar {
  position: fixed; bottom: 20px; left: calc(var(--side-w) + 16px); right: 16px;
  background: var(--blue); color: #fff; border-radius: 6px;
  padding: 12px 18px; display: none; align-items: center;
  justify-content: space-between; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 10;
}
.bar.on { display: flex; }
.bar-left { display: flex; align-items: center; gap: 10px; }
.bar-count { background: var(--cream); color: var(--blue); font-family: 'Dela Gothic One', sans-serif; font-size: 14px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.bar-total { font-family: 'Dela Gothic One', sans-serif; font-size: 16px; color: var(--cream); }
.bar-btns { display: flex; gap: 8px; }
.bar-btn { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; padding: 8px 14px; border-radius: 4px; border: none; transition: all .15s; }
.bar-btn-ok { background: var(--cream); color: var(--blue); font-weight: 600; }
.bar-btn-ok:hover { background: #ffe8c0; }
.bar-btn-cl { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.3); }
.bar-btn-cl:hover { color: #fff; }

/* ── модальный чек ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 20; display: none; align-items: center; justify-content: center; padding: 20px; }
.overlay.on { display: flex; }
.check { background: var(--cream); border-radius: 4px; max-width: 380px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.check::after { content: ''; display: block; height: 12px; background: repeating-linear-gradient(90deg, var(--cream) 0 10px, transparent 10px 20px), linear-gradient(180deg, transparent 50%, var(--cream) 50%); background-size: 20px 12px, 100% 12px; }
.check-head { text-align: center; padding: 20px 20px 12px; border-bottom: 1px dashed rgba(53,102,145,0.25); }
.check-shop { font-family: 'Dela Gothic One', sans-serif; font-size: 15px; color: var(--blue); }
.check-date { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 3px; }
.check-rows { padding: 10px 20px; }
.check-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px dotted rgba(53,102,145,0.15); gap: 6px; }
.check-row:last-child { border: none; }
.check-row-name { flex: 1; font-size: 13px; }
.check-row-controls { display: flex; align-items: center; gap: 4px; }
.check-qty-btn { background: var(--blue); color: #fff; border: none; width: 22px; height: 22px; border-radius: 2px; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.check-qty-btn:hover { background: #234f73; }
.check-qty { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
.check-row-sum { font-size: 13px; color: var(--blue); font-weight: 600; white-space: nowrap; min-width: 48px; text-align: right; }
.check-row-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.check-row-del:hover { color: #c0392b; }
.check-total { margin: 0 20px; padding: 10px 0; border-top: 2px solid var(--blue); display: flex; justify-content: space-between; }
.check-total-label { font-family: 'Dela Gothic One', sans-serif; font-size: 14px; color: var(--blue); }
.check-total-sum { font-family: 'Dela Gothic One', sans-serif; font-size: 20px; color: var(--blue); }
.check-actions { padding: 14px 20px 16px; display: flex; flex-direction: column; gap: 8px; }
.check-pay { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 0.06em; text-transform: uppercase; background: var(--blue); color: #fff; }
.check-pay:hover { background: #234f73; }
.check-back { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; background: transparent; color: var(--muted); }

footer { padding: 16px 28px; border-top: 1px solid var(--border); font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; text-align: center; }
</style>
</head>
<body>

<div class="side">
  <div class="side-menu">меню</div>
  <div class="side-name">под · крылом · ворона</div>
</div>

<div class="content">
  <div id="root"></div>
  <footer>Все цены указаны в галлеонах · Под крылом Ворона</footer>
</div>

<div class="bar" id="bar">
  <div class="bar-left">
    <div class="bar-count" id="bar-n">0</div>
    <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:0.05em;">позиций в заказе</span>
  </div>
  <div class="bar-total" id="bar-sum">0 G</div>
  <div class="bar-btns">
    <button class="bar-btn bar-btn-cl" onclick="clearCart()">Очистить</button>
    <button class="bar-btn bar-btn-ok" onclick="openCheck()">Показать чек</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeCheck()">
  <div class="check">
    <div class="check-head">
      <div class="check-shop">Под крылом Ворона</div>
      <div class="check-date" id="check-date"></div>
    </div>
    <div class="check-rows" id="check-rows"></div>
    <div class="check-total">
      <span class="check-total-label">Итого</span>
      <span class="check-total-sum" id="check-sum"></span>
    </div>
    <div class="check-actions">
      <button class="check-pay" id="check-pay-btn"><i class="fas fa-coins"></i> Перейти к оплате</button>
      <button class="check-back" onclick="closeCheck()">← Вернуться в меню</button>
    </div>
  </div>
</div>

<script>
var PAY = 'https://hogsmeade.dhog.org/ucp.php?i=-hogsmeade-bank-ucp-main_module&mode=personal_transactions';
var SELLER = 217;
var D = /*DATA_START*/null/*DATA_END*/;

var cart = [];

function total() { return cart.reduce(function(s,i){ return s + i.p * i.q; }, 0); }
function count() { return cart.reduce(function(s,i){ return s + i.q; }, 0); }

function add(name, price, comment, btn) {
  price = parseFloat(price) || 0;
  var found = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].n === name && cart[i].c === comment) { found = cart[i]; break; }
  }
  if (found) found.q++;
  else cart.push({n: name, p: price, c: comment, q: 1});
  if (btn) btn.classList.add('added');
  updateBar();
}

function changeQty(idx, delta) {
  if (!cart[idx]) return;
  cart[idx].q += delta;
  if (cart[idx].q <= 0) cart.splice(idx, 1);
  updateBar();
  renderCheck();
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateBar();
  if (cart.length === 0) closeCheck();
  else renderCheck();
}

function clearCart() {
  cart = [];
  updateBar();
  document.querySelectorAll('.add-btn.added').forEach(function(b){ b.classList.remove('added'); });
}

function updateBar() {
  var n = count();
  document.getElementById('bar-n').textContent = n;
  document.getElementById('bar-sum').textContent = total() + ' G';
  document.getElementById('bar').className = n > 0 ? 'bar on' : 'bar';
}

function renderCheck() {
  var rows = document.getElementById('check-rows');
  if (!rows) return;
  rows.innerHTML = cart.map(function(item, idx){
    return '<div class="check-row">' +
      '<span class="check-row-name">' + e(item.n) + '</span>' +
      '<div class="check-row-controls">' +
        '<button class="check-qty-btn" onclick="changeQty(' + idx + ',-1)">−</button>' +
        '<span class="check-qty">' + item.q + '</span>' +
        '<button class="check-qty-btn" onclick="changeQty(' + idx + ',1)">+</button>' +
      '</div>' +
      '<span class="check-row-sum">' + (item.p * item.q) + ' G</span>' +
      '<button class="check-row-del" onclick="removeItem(' + idx + ')" title="Удалить">✕</button>' +
    '</div>';
  }).join('');
  document.getElementById('check-sum').textContent = total() + ' G';
  var comment = cart.map(function(i){ return i.q > 1 ? i.c + ' x' + i.q : i.c; }).join(', ');
  document.getElementById('check-pay-btn').onclick = function(){
    window.open(PAY + '&to=' + SELLER + '&amount=' + encodeURIComponent(total()) + '&comment=' + encodeURIComponent(comment), '_top');
  };
}

function openCheck() {
  if (!cart.length) return;
  var now = new Date();
  document.getElementById('check-date').textContent = now.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
  renderCheck();
  document.getElementById('overlay').className = 'overlay on';
}

function closeCheck() { document.getElementById('overlay').className = 'overlay'; }

function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  var data = D || JSON.parse(localStorage.getItem('voron_menu') || 'null') || {categories:[]};
  var root = document.getElementById('root');
  if (!data.categories || !data.categories.length) {
    root.innerHTML = '<p style="padding:40px;color:#999;font-style:italic;text-align:center;">Меню скоро появится...</p>';
    return;
  }
  var html = '';
  for (var ci = 0; ci < data.categories.length; ci++) {
    var cat = data.categories[ci];
    if (!cat.items || !cat.items.length) continue;
    html += '<div class="cat-title">' + e(cat.name) + '</div><div class="items-grid">';
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      var hasImg = item.img && item.img.trim();
      var hasV = item.variants && item.variants.length;
      var pn = JSON.stringify(item.name);
      var pc = JSON.stringify(item.comment || item.name);
      html += '<div class="item">';
      if (hasImg) html += '<img class="item-img" src="' + e(item.img) + '" onerror="this.remove()">';
      html += '<div class="item-top"><span class="item-name">' + e(item.name) + '</span>';
      if (!hasV) html += '<span class="item-dots"></span><span style="font-size:14px;font-weight:600;color:var(--blue);white-space:nowrap;">' + e(item.price) + '</span>';
      html += '</div>';
      if (item.desc) html += '<div class="item-desc">' + e(item.desc) + '</div>';
      if (item.ingredients) html += '<div class="item-ing"><b>Состав:</b> ' + e(item.ingredients) + '</div>';
      if (hasV) {
        html += '<div class="variants">';
        for (var vi = 0; vi < item.variants.length; vi++) {
          var v = item.variants[vi];
          var vn = JSON.stringify(item.name + ' — ' + v.label);
          var vc = JSON.stringify(v.comment || item.name + ' ' + v.label);
          html += '<div class="variant"><span class="variant-label">' + e(v.label) + '</span>';
          html += '<button class="add-btn" onclick="add(' + vn + ',' + parseFloat(v.price||0) + ',' + vc + ',this)">Заказать <i class="fas fa-coins"></i> <span class="price-tag">' + e(v.price) + ' G</span></button></div>';
        }
        html += '</div>';
      } else {
        html += '<button class="add-btn" onclick="add(' + pn + ',' + parseFloat(item.price||0) + ',' + pc + ',this)">Заказать <i class="fas fa-coins"></i> <span class="price-tag">' + e(item.price) + ' G</span></button>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  root.innerHTML = html;
}

render();
</script>
</body>
</html>
